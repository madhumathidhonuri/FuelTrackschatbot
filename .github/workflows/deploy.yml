name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Call Render Deploy Hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
